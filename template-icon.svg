<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3B82F6"/><stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
  </defs>
  <rect width="800" height="800" rx="120" fill="url(#bg)"/>
  <!-- Task/checklist icon -->
  <g transform="translate(400,400)">
    <!-- Checklist card -->
    <rect x="-180" y="-120" width="360" height="240" rx="24" fill="#FFFFFF" opacity="0.95"/>
    <!-- Check marks -->
    <path d="M -140 -60 l 30 30 l 50 -50" stroke="#3B82F6" stroke-width="12" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M -140 -10 l 30 30 l 50 -50" stroke="#3B82F6" stroke-width="12" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M -140 40 l 30 30 l 50 -50" stroke="#9CA3AF" stroke-width="12" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>