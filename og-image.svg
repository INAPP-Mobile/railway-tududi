<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#EFF6FF"/>
      <stop offset="50%" stop-color="#DBEAFE"/>
      <stop offset="100%" stop-color="#BFDBFE"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Central checklist/task icon -->
  <g transform="translate(600, 315)">
    <!-- Card background -->
    <rect x="-140" y="-100" width="280" height="200" rx="16" fill="white" stroke="url(#accent)" stroke-width="3"/>
    
    <!-- Checklist items -->
    <g stroke="url(#accent)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <!-- Item 1 - checked -->
      <path d="M-100 -40 L-60 0 L20 -70"/>
      <rect x="-100" y="-48" width="16" height="16" rx="3" fill="url(#accent)"/>
      <path d="M-93 -40 L-97 -36 L-88 -30" stroke="white" stroke-width="3"/>
      
      <!-- Item 2 - checked -->
      <path d="M-100 10 L-60 50 L20 -20"/>
      <rect x="-100" y="2" width="16" height="16" rx="3" fill="url(#accent)"/>
      <path d="M-93 10 L-97 14 L-88 20" stroke="white" stroke-width="3"/>
      
      <!-- Item 3 - unchecked -->
      <rect x="-100" y="50" width="16" height="16" rx="3" stroke="url(#accent)" stroke-width="3" fill="none"/>
      <path d="M-90 58 L-30 58" stroke="#94A3B8" stroke-width="3" stroke-linecap="round"/>
    </g>
    
    <!-- Decorative accent dots -->
    <circle cx="-180" cy="-140" r="12" fill="url(#accent)" opacity="0.15"/>
    <circle cx="180" cy="140" r="12" fill="#2563EB" opacity="0.15"/>
    <circle cx="-180" cy="140" r="8" fill="#3B82F6" opacity="0.2"/>
    <circle cx="180" cy="-140" r="8" fill="#2563EB" opacity="0.2"/>
  </g>
  
  <!-- Subtle pattern elements -->
  <g opacity="0.1">
    <circle cx="150" cy="150" r="60" fill="#3B82F6"/>
    <circle cx="1050" cy="480" r="80" fill="#2563EB"/>
    <circle cx="150" cy="480" r="40" fill="#3B82F6"/>
    <circle cx="1050" cy="150" r="60" fill="#2563EB"/>
  </g>
</svg>