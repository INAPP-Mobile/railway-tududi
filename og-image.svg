<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Task/checklist icon -->
  <g transform="translate(160,315)">
    <rect x="-60" y="-35" width="120" height="70" rx="8" fill="none" stroke="#3B82F6" stroke-width="4"/>
    <rect x="-50" y="-55" width="100" height="18" rx="4" fill="#3B82F6" opacity="0.3"/>
    <path d="M -140 -60 l 30 30 l 50 -50" stroke="#3B82F6" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M -140 -10 l 30 30 l 50 -50" stroke="#3B82F6" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- Text -->
  <text x="420" y="290" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="700" fill="#ffffff" letter-spacing="1">Tududi</text>
  <text x="420" y="345" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#3B82F6" letter-spacing="0.5">Calm Task Management System</text>
  <!-- Railway badge -->
  <g transform="translate(420,380)">
    <rect x="0" y="0" width="220" height="36" rx="18" fill="#1D4ED8"/>
    <text x="110" y="24" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#ffffff" text-anchor="middle">Deploy on Railway</text>
  </g>
</svg>